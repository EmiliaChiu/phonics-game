      b.innerHTML = `${t.shape} <br>${t.symbol}`;
      b.onclick = () => checkTone(t.id, b, q);
      tc.appendChild(b);
    });
    setTimeout(() => speak(q.word, 0.85), 400);
  }

  function checkTone(toneId, btn, q) {
    if (toneId === q.tone) {
      btn.style.outline = '5px solid #7ED957';
      correct++;
      setTimeout(nextTone, 800);
    } else {
      btn.style.outline = '5px solid #FF8888';
      const correctBtn = [...area.querySelectorAll('.tone-shape')][q.tone - 1];
      correctBtn.style.outline = '5px solid #7ED957';
      setTimeout(nextTone, 1500);
    }
  }

  function nextTone() {
    tIdx++;
    if (tIdx >= toneQuestions.length) finish();
    else renderTone();
  }

  function finish() {
    const ratio = correct / totalQ;
    let stars = 1;
    if (ratio >= 0.85) stars = 3;
    else if (ratio >= 0.6) stars = 2;
    recordGameScore(lessonId, 'quiz', correct, stars);
    if (stars >= 2) confetti();
    showResult({
      emoji: stars === 3 ? '🎓' : stars === 2 ? '😊' : '💪',
      title: stars >= 2 ? '總複習過關，畢業了！' : '再多練習一下，很快就會了',
      stars,
      score: `答對 ${correct}/${totalQ} 題（拼音＋聲調）`,
      msg: '23堂的注音符號都複習完了，你真的很棒！',
      lessonId,
    });
  }

  renderCombine();
}

/* === 闖關測驗：形近混淆組（用於挑選容易搞混的干擾選項／找不同的多數符號／消失字家族） === */
const CONFUSE_GROUPS = [
  ['ㄅ', 'ㄆ', 'ㄇ', 'ㄈ'],
  ['ㄉ', 'ㄊ', 'ㄋ', 'ㄌ'],
  ['ㄍ', 'ㄎ', 'ㄏ'],
  ['ㄐ', 'ㄑ', 'ㄒ'],
  ['ㄓ', 'ㄔ', 'ㄕ', 'ㄖ'],
  ['ㄗ', 'ㄘ', 'ㄙ'],
  ['ㄧ', 'ㄨ', 'ㄩ'],
  ['ㄚ', 'ㄛ', 'ㄜ', 'ㄝ'],
  ['ㄞ', 'ㄟ', 'ㄠ', 'ㄡ'],
  ['ㄢ', 'ㄣ', 'ㄤ', 'ㄥ'],
  ['ㄧㄢ', 'ㄧㄠ', 'ㄧㄡ', 'ㄧㄝ', 'ㄧㄚ', 'ㄧㄣ', 'ㄧㄛ', 'ㄧㄤ', 'ㄧㄥ'],
  ['ㄨㄛ', 'ㄨㄟ', 'ㄨㄞ', 'ㄨㄢ', 'ㄨㄤ', 'ㄨㄥ', 'ㄨㄚ', 'ㄨㄣ'],
  ['ㄩㄣ', 'ㄩㄝ', 'ㄩㄢ', 'ㄩㄥ'],
];

// 優先從同一組「形近混淆」符號裡選干擾項，題庫不夠時才 fallback 隨機選
function getConfusables(target, pool, count) {
  const group = CONFUSE_GROUPS.find(g => g.includes(target)) || [];
  let candidates = shuffle(group.filter(s => s !== target && pool.includes(s)));
  if (candidates.length < count) {
    const rest = shuffle(pool.filter(s => s !== target && !candidates.includes(s)));
    candidates = candidates.concat(rest);
  }
  return candidates.slice(0, count);
}

// 「消失的字」用：優先整組從同一個形近混淆家族抽（同家族更考驗認讀，而非亂猜），家族不夠大就退而求其次
function pickVanishRow(pool, size) {
  const familyPools = CONFUSE_GROUPS.map(g => g.filter(s => pool.includes(s))).filter(g => g.length >= 2);
  if (familyPools.length === 0) return shuffle(pool).slice(0, Math.min(size, pool.length));
  const eligible = familyPools.filter(g => g.length >= size);
  const family = eligible.length > 0 ? pickRandom(eligible, 1)[0] : familyPools.slice().sort((a, b) => b.length - a.length)[0];
  return shuffle(family).slice(0, Math.min(size, family.length));
}

// 闖關測驗題型依堂次輪替（每3堂一輪，避免每堂都長一樣），第23堂另有 special:'graduation' 覆蓋，不受此影響
const QUIZ_VARIANTS = ['balloon', 'oddone', 'vanish'];
function getQuizVariant(lessonId) {
  return QUIZ_VARIANTS[(lessonId - 1) % QUIZ_VARIANTS.length];
}

/* === 闖關測驗（10 題，純測「認讀符號本身」，避免跟「聽音點點看」「連連看」重複——
   三種題型依堂次輪替：🎈聽音氣球／🔎找不同(老師覆判念讀)／👀消失的字(記憶回想) === */
function buildQuiz(area, lessonId, focus, pool, numQ) {
  const requestedQ = numQ || 10;
  // 題目：60% 本堂、40% 舊
  const newQuotient = Math.ceil(requestedQ * 0.6);
  const oldQuotient = requestedQ - newQuotient;
  const newQs = focus.length > 0 ? lesson_buildCardSet(focus, focus, newQuotient) : pickRandom(pool, newQuotient);
  const oldOnly = pool.filter(s => !focus.includes(s));
  // 早期堂次題庫還很小時，舊內容可能湊不滿 oldQuotient，這是正常的——
  // 絕對不要用「想要的題數」當 totalQ，要用「實際出好的題數」，否則最後一題會讀到
  // 不存在的 questions[idx] 而拋錯，導致整個遊戲卡死（第 1 堂曾發生過這個當機問題）。
  const oldQs = pickRandom(oldOnly.length > 0 ? oldOnly : pool, oldQuotient);
  const questionTargets = shuffle([...newQs, ...oldQs]);

  const variant = getQuizVariant(lessonId);
  const BALLOON_COLORS = ['balloon-c0', 'balloon-c1', 'balloon-c2', 'balloon-c3'];

  const questions = questionTargets.map(target => {
    if (variant === 'oddone') {
      // 找不同：4 格顯示同一個「多數符號」（優先挑目標的形近混淆字），1 格顯示目標本身，老師覆判孩子有沒有找對、念對
      const majorityPool = getConfusables(target, pool, 1);
      const majority = majorityPool[0] || pickRandom(pool.filter(s => s !== target), 1)[0];
      const tiles = shuffle([majority, majority, majority, majority, target]);
      const targetIdx = tiles.indexOf(target);
      return { target, tiles, targetIdx };
    }
    if (variant === 'vanish') {
      // 消失的字：一排符號看清楚後，其中一個變成「？」，再過幾秒全部蓋起來，孩子要從記憶中點出剛剛少了哪一個
      const row = pickVanishRow(pool, 4);
      const vanishTarget = pickRandom(row, 1)[0];
      return { row, target: vanishTarget };
    }
    // balloon：聽音找氣球
    const distractors = getConfusables(target, pool, 3);
    const choices = shuffle([target, ...distractors]);
    return { target, choices };
  });
  const totalQ = questions.length; // 用實際題數，避免 idx 超出陣列範圍

  let idx = 0;
  let correct = 0;

  function populateBalloons(q) {
    const sky = document.getElementById('quiz-area-main');
    const lanes = shuffle([8, 30, 52, 74]); // 4 條水平車道，打散順序避免每次都同一顆先飛
    q.choices.forEach((sym, i) => {
      const btn = document.createElement('button');
      btn.className = `balloon-btn ${BALLOON_COLORS[i % BALLOON_COLORS.length]}`;
      btn.dataset.sym = sym;
      btn.innerHTML = vbopo(sym);
      btn.style.left = lanes[i % lanes.length] + '%';
      btn.style.animationDelay = (i * 1.3) + 's'; // 一顆一顆飛上來，不是同時全部出現
      btn.onclick = () => {
        document.querySelectorAll('.balloon-btn').forEach(b => b.classList.add('disabled'));
        if (sym === q.target) {
          btn.classList.add('correct');
          correct++;
          clearWrongAnswer(q.target);
          setTimeout(next, 800);
        } else {
          btn.classList.add('wrong');
          const correctBtn = [...document.querySelectorAll('.balloon-btn')].find(b => b.dataset.sym === q.target);
          if (correctBtn) correctBtn.classList.add('correct');
          recordWrongAnswer(q.target);
          speakSymbol(q.target);
          setTimeout(next, 1500);
        }
      };
      sky.appendChild(btn);
    });
  }

  function populateOddOne(q) {
    const cc = document.getElementById('quiz-area-main');
    q.tiles.forEach(sym => {
      const div = document.createElement('div');
      div.className = 'choice-btn';
      div.style.cursor = 'default';
      div.innerHTML = vbopo(sym);
      cc.appendChild(div);
    });
    const tileEls = [...cc.children];
    // 3秒後全部蓋起來，逼孩子憑記憶回想剛剛哪一格不一樣，而不是一直盯著看比對
    setTimeout(() => {
      tileEls.forEach(t => { t.innerHTML = '🎴'; t.classList.add('vanish-covered'); });
      document.getElementById('oddone-judge').style.display = 'flex';
    }, 3000);

    let judged = false;
    function judge(isCorrect) {
      if (judged) return;
      judged = true;
      document.getElementById('oddone-judge').style.display = 'none';
      tileEls.forEach((t, i) => {
        t.innerHTML = vbopo(q.tiles[i]);
        t.classList.remove('vanish-covered');
      });
      tileEls[q.targetIdx].classList.add('correct');
      if (isCorrect) {
        correct++;
        clearWrongAnswer(q.target);
        setTimeout(next, 900);
      } else {
        recordWrongAnswer(q.target);
        setTimeout(next, 1200);
      }
    }
    document.getElementById('oddone-correct-btn').onclick = () => judge(true);
    document.getElementById('oddone-wrong-btn').onclick = () => judge(false);
  }

  function populateVanish(q) {
    const rowEl = document.getElementById('vanish-row');
    q.row.forEach(sym => {
      const div = document.createElement('div');
      div.className = 'choice-btn';
      div.style.cursor = 'default';
      div.dataset.sym = sym;
      div.innerHTML = vbopo(sym);
      rowEl.appendChild(div);
    });
    const tiles = [...rowEl.children];
    const targetTile = tiles.find(t => t.dataset.sym === q.target);
    // 3秒後：目標那張變成？（其餘仍看得到）
    setTimeout(() => {
      targetTile.innerHTML = '？';
      targetTile.style.color = '#bbb';
      targetTile.style.borderStyle = 'dashed';
    }, 3000);
    // 再3秒後（共6秒）：全部蓋起來，逼孩子真正靠記憶回想，而不是用剩下還看得到的去推
    setTimeout(() => {
      tiles.forEach(t => {
        t.innerHTML = '🎴';
        t.classList.add('vanish-covered');
        t.style.color = '';
        t.style.borderStyle = '';
      });
      const cc = document.getElementById('quiz-area-main');
      shuffle(q.row).forEach(sym => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.dataset.sym = sym;
        btn.innerHTML = vbopo(sym);
        btn.onclick = () => {
          document.querySelectorAll('#quiz-area-main .choice-btn').forEach(b => b.classList.add('disabled'));
          if (sym === q.target) {
            btn.classList.add('correct');
            correct++;
            clearWrongAnswer(q.target);
            setTimeout(next, 800);
          } else {
            btn.classList.add('wrong');
            const correctBtn = [...document.querySelectorAll('#quiz-area-main .choice-btn')].find(b => b.dataset.sym === q.target);
            if (correctBtn) correctBtn.classList.add('correct');
            recordWrongAnswer(q.target);
            speakSymbol(q.target);
            setTimeout(next, 1500);
          }
        };
        cc.appendChild(btn);
      });
    }, 6000);
  }

  function render() {
    const q = questions[idx];

    let headerHtml = '';
    let bodyHtml = '';
    if (variant === 'balloon') {
      headerHtml = `<h3>🎈 聽音找氣球，點出正確的注音</h3>`;
      bodyHtml = `
        <div class="speaker-big" style="width:100px;height:100px;line-height:100px;font-size:50px;" onclick="speakSymbol('${q.target}')">🔊</div>
        <div id="quiz-area-main" class="balloon-sky"></div>
      `;
    } else if (variant === 'oddone') {
      headerHtml = `<h3>🔎🗣️ 記住哪一個不一樣，蓋起來後念出來給老師聽</h3>`;
      bodyHtml = `
        <div id="quiz-area-main" class="choices-grid" style="max-width:600px;margin:0 auto 20px;"></div>
        <div class="wheel-judge" id="oddone-judge" style="display:none;">
          <button class="ctrl-btn success" id="oddone-correct-btn">✅ 找對了，也念對了</button>
          <button class="ctrl-btn info" id="oddone-wrong-btn">🔁 再練習一次</button>
        </div>
      `;
    } else if (variant === 'vanish') {
      headerHtml = `<h3>👀 記住它們，少了哪一個？</h3>`;
      bodyHtml = `
        <div id="vanish-row" class="vanish-row-line" style="margin:0 auto 20px;"></div>
        <p style="color:#666;font-size:16px;margin-bottom:10px;">牌蓋起來後，請點出「少了哪一個」</p>
        <div id="quiz-area-main" class="vanish-row-line" style="margin:0 auto;"></div>
      `;
    }

    area.innerHTML = `
      <div class="game-title-bar">
        <h2>🏆 闖關測驗</h2>
        <div class="game-stats">
          <div class="stat-box">${idx+1}/${totalQ}</div>
          <div class="stat-box">對 ${correct}</div>
        </div>
      </div>
      <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${((idx)/totalQ)*100}%"></div></div>
      <div class="quiz-area">
        <div class="quiz-question">${headerHtml}</div>
        ${bodyHtml}
      </div>
    `;

    if (variant === 'balloon') {
      populateBalloons(q);
      setTimeout(() => speakSymbol(q.target), 400);
    } else if (variant === 'oddone') {
      populateOddOne(q);
    } else if (variant === 'vanish') {
      populateVanish(q);
    }
  }

  function next() {
    idx++;
    if (idx >= totalQ) finish();
    else render();
  }

  function finish() {
    const ratio = correct / totalQ;
    let stars = 1;
    if (ratio >= 0.9) stars = 3;
    else if (ratio >= 0.7) stars = 2;
    recordGameScore(lessonId, 'quiz', correct, stars);
    const passed = stars >= 2;
    if (passed) confetti();
    showResult({
      emoji: stars === 3 ? '🏆' : stars === 2 ? '🌟' : '💪',
      title: stars === 3 ? '滿分通過！太厲害了！' : stars === 2 ? '通過測驗！' : '差一點點，再加油！',
      stars,
      score: `答對 ${correct} / ${totalQ} 題`,
      msg: passed
        ? '恭喜通過！可以挑戰下一堂的內容囉！'
        : '建議回去玩「認讀字卡」「聽音點點看」多熟悉，再來測驗一次喔！',
      lessonId,
      retry: !passed,
    });
  }

  render();
}

/* === 錯題複習 === */
function buildReview(area, lessonId, focus, pool) {
  const wrongPool = getWrongSymbols(pool);
  if (wrongPool.length === 0) {
    area.innerHTML = `
      <div class="game-title-bar"><h2>🔁 錯題複習</h2></div>
      <div style="text-align:center;padding:60px 20px;">
        <div style="font-size:80px;margin-bottom:20px;">🎉</div>
        <h3 style="color:#7ED957;font-size:24px;margin-bottom:12px;">目前沒有錯題！</h3>
        <p style="color:#888;font-size:16px;">先去玩玩其他遊戲，答錯的題目會自動收集在這裡，之後可以回來複習。</p>
      </div>
    `;
    return;
  }

  const questions = shuffle(wrongPool).map(target => {
    const distractors = pickRandom(pool.filter(s => s !== target), 3);
    return { target, choices: shuffle([target, ...distractors]) };
  });

  let idx = 0, correct = 0;

  function render() {
    const q = questions[idx];
    area.innerHTML = `
      <div class="game-title-bar">
        <h2>🔁 錯題複習</h2>
        <div class="game-stats">
          <div class="stat-box">${idx + 1}/${questions.length}</div>
          <div class="stat-box">答對 ${correct}</div>
        </div>
      </div>
      <div class="listen-area">
        <div class="speaker-big" onclick="speakSymbol('${q.target}')">🔊</div>
        <p style="color:#666;margin-bottom:20px;font-size:16px;">這些是之前答錯過的注音，再聽一次選出正確答案</p>
        <div class="choices-grid" id="choices"></div>
      </div>
    `;
    const cg = document.getElementById('choices');
    q.choices.forEach(sym => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.dataset.sym = sym;
      btn.innerHTML = vbopo(sym);
      btn.onclick = () => answer(sym, btn, q.target);
      cg.appendChild(btn);
    });
    setTimeout(() => speakSymbol(q.target), 400);
  }

  function answer(sym, btn, target) {
    const allBtns = area.querySelectorAll('.choice-btn');
    allBtns.forEach(b => b.classList.add('disabled'));
    if (sym === target) {
      btn.classList.add('correct');
      correct++;
      clearWrongAnswer(target);
      setTimeout(next, 900);
    } else {
      btn.classList.add('wrong');
      allBtns.forEach(b => { if (b.dataset.sym === target) b.classList.add('correct'); });
      recordWrongAnswer(target);
      setTimeout(next, 1400);
    }
  }

  function next() {
    idx++;
    if (idx >= questions.length) finish();
    else render();
  }

  function finish() {
    const remaining = getWrongSymbols(pool).length;
    const ratio = correct / questions.length;
    let stars = 1;
    if (ratio >= 0.9) stars = 3;
    else if (ratio >= 0.7) stars = 2;
    recordGameScore(lessonId, 'review', correct, stars);
    if (remaining === 0) confetti();
    showResult({
      emoji: remaining === 0 ? '🎉' : '💪',
      title: remaining === 0 ? '錯題全部複習完成！' : '複習完成',
      stars,
      score: `答對 ${correct}/${questions.length} 題・還剩 ${remaining} 題待複習`,
      msg: remaining === 0 ? '錯題本清空了，太厲害了！' : '還有一些題目要加油，可以再玩一次複習！',
      lessonId,
    });
  }

  render();
}

/* === 結果 Modal === */
function showResult({ emoji, title, stars, score, msg, lessonId, retry }) {
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.innerHTML = `
    <div class="modal">
      <div class="emoji-big">${emoji}</div>
      <h2>${title}</h2>
      <div class="stars-result">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
      <div class="score-text">${score}</div>
      <div class="modal-msg">${msg}</div>
      <div class="modal-buttons">
        <button class="ctrl-btn primary" onclick="this.closest('.modal-bg').remove(); goLesson(${lessonId});">📋 回課堂選單</button>
        ${retry ? `<button class="ctrl-btn success" onclick="this.closest('.modal-bg').remove(); goHome();">🏠 回首頁</button>` : `<button class="ctrl-btn info" onclick="this.closest('.modal-bg').remove(); goHome();">🏠 回首頁</button>`}
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}
