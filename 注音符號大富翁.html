<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注音符號大富翁</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif;
    background: linear-gradient(135deg, #FFE5F1 0%, #E5F4FF 50%, #FFF9E5 100%);
    min-height: 100%;
  }
  button { font-family: inherit; cursor: pointer; border: none; }
  #app { max-width: 1200px; margin: 0 auto; padding: 16px; }

  /* ---------- 通用 ---------- */
  .vbopo { display: inline-flex; flex-direction: column; align-items: center; line-height: 1.05; }
  .vbopo > span { display: block; }

  .btn {
    padding: 12px 24px; border-radius: 20px; font-size: 20px; font-weight: bold;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15); transition: transform 0.1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }
  .btn-pink { background: linear-gradient(135deg, #ff6b9d, #FF9EC4); color: #fff; }
  .btn-yellow { background: linear-gradient(135deg, #FFC857, #FFDA8C); color: #7a4a00; }
  .btn-blue { background: linear-gradient(135deg, #A6D9F7, #C7E9FB); color: #094a6b; }
  .btn-green { background: linear-gradient(135deg, #7ED957, #A3E67F); color: #1a4d0a; }
  .btn-gray { background: #e0e0e0; color: #555; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  h1, h2, h3 { margin: 0 0 12px; }
  .card-panel {
    background: rgba(255,255,255,0.85); border-radius: 24px; padding: 24px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  }

  /* ---------- 開場畫面 ---------- */
  .start-title { text-align: center; font-size: 42px; color: #ff6b9d; margin: 20px 0; }
  .start-sub { text-align: center; font-size: 18px; color: #777; margin-bottom: 24px; }
  .team-count-row, .mode-row { display: flex; justify-content: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .team-name-list { display: flex; flex-direction: column; gap: 10px; max-width: 420px; margin: 0 auto 24px; }
  .team-name-row { display: flex; align-items: center; gap: 10px; }
  .team-name-row .mascot { font-size: 32px; }
  .team-name-row input {
    flex: 1; font-size: 18px; padding: 10px 14px; border-radius: 14px; border: 2px solid #ffd3e6;
  }
  .last-result { text-align: center; color: #888; font-size: 15px; margin-bottom: 12px; }
  .center-row { text-align: center; }
  .mode-desc { text-align: center; color: #999; font-size: 13px; margin: -12px 0 20px; }

  /* ---------- 記分列 ---------- */
  .score-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
  .score-chip {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 16px;
    background: #fff; box-shadow: 0 3px 8px rgba(0,0,0,0.08); font-size: 14px; font-weight: bold;
    border: 3px solid transparent;
  }
  .score-chip.active { transform: scale(1.1); }
  .score-chip .mascot { font-size: clamp(18px, 2.4vw, 26px); }

  /* ---------- 棋盤（環狀） ---------- */
  .board-wrap { display: flex; justify-content: center; margin: 16px 0; }
  .board-grid {
    position: relative; display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr);
    gap: 4px; width: 100%; max-width: 1140px; aspect-ratio: 1/1;
    background: linear-gradient(135deg, #FFF3E0, #FFE8CC); border-radius: 28px; padding: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .tile {
    position: relative; border-radius: 14px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-weight: bold; color: #fff; overflow: visible;
    box-shadow: inset 0 0 0 3px rgba(255,255,255,0.6);
    transition: transform 0.2s;
  }
  .tile .sym { font-size: clamp(15px, 2.1vw, 27px); line-height: 1.03; }
  .tile .cat-icon { font-size: clamp(18px, 2.6vw, 30px); }
  .tile .tile-label { font-size: clamp(8px, 1vw, 12px); margin-top: 2px; opacity: 0.95; font-weight: bold; }
  .tile.cat-consonant { background: linear-gradient(150deg, #ff6b9d, #FF9EC4); }
  .tile.cat-single { background: linear-gradient(150deg, #6FC3EE, #A6D9F7); }
  .tile.cat-fate { background: linear-gradient(150deg, #FFC857, #FFDA8C); color: #7a4a00; }
  .tile.cat-parking { background: linear-gradient(150deg, #B0B0B0, #D6D6D6); color: #555; }
  .tile.cat-start { background: linear-gradient(150deg, #7ED957, #A3E67F); }
  .tile-landed { animation: tileLand 0.6s ease; z-index: 6; }
  @keyframes tileLand {
    0% { transform: scale(1); }
    40% { transform: scale(1.5); box-shadow: 0 0 0 6px rgba(255,255,255,0.95), 0 8px 18px rgba(0,0,0,0.35); }
    100% { transform: scale(1); }
  }
  .tile-pawns { position: absolute; bottom: -8px; display: flex; justify-content: center; z-index: 4; }
  .tile-pawns span { font-size: clamp(20px, 3vw, 32px); filter: drop-shadow(0 2px 2px rgba(0,0,0,0.45)); margin-left: -8px; }
  .tile-pawns span:first-child { margin-left: 0; }

  /* ---------- 中央面板 ---------- */
  .board-center {
    grid-column: 2 / 11; grid-row: 2 / 11; border-radius: 18px;
    background: rgba(255,255,255,0.92); box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 10px; gap: 6px; overflow: hidden;
  }
  .center-title { font-size: clamp(18px, 2.8vw, 30px); color: #ff6b9d; font-weight: bold; }
  .tier-badge { font-size: clamp(11px, 1.4vw, 15px); color: #999; margin-bottom: 4px; }
  .center-turn { font-size: clamp(14px, 2.2vw, 22px); text-align: center; }
  .center-dice-row { display: flex; align-items: center; gap: 16px; }
  .dice-box {
    display: inline-block; width: clamp(52px,7.2vw,76px); height: clamp(52px,7.2vw,76px);
    background: linear-gradient(150deg, #ffffff, #f2f2f2); border-radius: 16px; border: 2px solid #fff;
    box-shadow: 0 5px 0 #dcdcdc, 0 8px 14px rgba(0,0,0,0.25), inset 0 2px 3px rgba(255,255,255,0.9);
  }
  .dice-box.rolling { animation: diceRoll 0.5s linear infinite; }
  @keyframes diceRoll {
    0% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(90deg) scale(1.1); }
    50% { transform: rotate(180deg) scale(0.92); }
    75% { transform: rotate(270deg) scale(1.08); }
    100% { transform: rotate(360deg) scale(1); }
  }
  .die-face { display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); width: 100%; height: 100%; padding: 9px; gap: 2px; }
  .die-face .pip { border-radius: 50%; }
  .die-face .pip.on { background: radial-gradient(circle at 35% 30%, #ff9dbf, #ff6b9d); box-shadow: inset 0 1px 2px rgba(0,0,0,0.25); }
  .tone-legend { display: flex; gap: 4px; margin-top: 2px; }
  .tone-mini { width: clamp(28px,3.8vw,42px); text-align: center; font-size: clamp(9px,1.1vw,11px); color: #888; }
  .tone-mini .shape { font-size: clamp(13px,1.9vw,20px); color: #555; }
  .pile-row { display: flex; gap: 10px; margin-top: 4px; }
  .pile {
    width: clamp(46px,6.6vw,70px); height: clamp(34px,5vw,54px); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; text-align: center;
    font-size: clamp(9px,1.2vw,12px); font-weight: bold; color: #fff; position: relative;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.15), -1px -1px 0 rgba(255,255,255,0.4) inset;
  }
  .pile::before {
    content: ''; position: absolute; inset: -3px -3px auto auto; width: 100%; height: 100%;
    border-radius: 8px; background: inherit; z-index: -1; transform: rotate(-6deg);
  }
  .pile-fate { background: linear-gradient(150deg, #FFC857, #FFDA8C); color: #7a4a00; }
  .pile-consonant { background: linear-gradient(150deg, #ff6b9d, #FF9EC4); }
  .pile-final { background: linear-gradient(150deg, #6FC3EE, #A6D9F7); }
  .pile-combined { background: linear-gradient(150deg, #A78BE0, #C6B3F5); }

  /* ---------- 彈窗 ---------- */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center;
    justify-content: center; z-index: 50; padding: 16px;
  }
  .modal-box {
    background: #fff; border-radius: 28px; padding: 32px; max-width: 560px; width: 100%;
    text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .modal-box h2 { font-size: 26px; }
  .big-symbol { font-size: 90px; margin: 16px 0; }
  .card-row { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
  .draw-card {
    background: linear-gradient(160deg, #fff, #FFF3F8); border-radius: 18px; padding: 18px 22px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15); font-size: 60px; min-width: 100px;
    animation: cardPop 0.35s ease;
  }
  @keyframes cardPop { from { transform: scale(0.4) rotate(-8deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
  .card-label { font-size: 14px; color: #999; margin-top: 6px; }
  .tone-card { font-size: 40px; }
  .judge-row { display: flex; justify-content: center; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
  .modal-note { color: #888; font-size: 15px; margin-top: 4px; }

  .rank-list { list-style: none; padding: 0; margin: 16px 0; text-align: left; }
  .rank-list li {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 14px;
    background: #FFF7FB; margin-bottom: 8px; font-size: 20px;
  }
  .rank-list li .mascot { font-size: 28px; }
  .rank-list li .score { margin-left: auto; font-weight: bold; color: #ff6b9d; }

  @media (max-width: 700px) {
    .tile .sym { font-size: 10px; }
    .tile .cat-icon { font-size: 13px; }
    .tile .tile-label { font-size: 6px; }
    .big-symbol { font-size: 60px; }
    .draw-card { font-size: 42px; padding: 12px 16px; }
  }
</style>
</head>

const CONSONANTS = ['ㄅ','ㄆ','ㄇ','ㄈ','ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄐ','ㄑ','ㄒ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄘ','ㄙ'];
const COMBINED_FINALS = ['ㄧㄢ','ㄧㄠ','ㄧㄡ','ㄧㄝ','ㄧㄚ','ㄧㄣ','ㄨㄛ','ㄧㄛ','ㄧㄤ','ㄧㄥ','ㄨㄟ','ㄨㄞ','ㄨㄢ','ㄨㄤ','ㄨㄥ','ㄨㄚ','ㄨㄣ','ㄩㄣ','ㄩㄝ','ㄩㄢ','ㄩㄥ'];
const ALL_SYMBOLS = Object.keys(PHONETIC_DATA);
const FINALS_SINGLE = ALL_SYMBOLS.filter(s => !CONSONANTS.includes(s) && !COMBINED_FINALS.includes(s));
/* 棋盤格只用這 37 個（21聲符+16韻符），結合韻不上棋盤，只當進階/高階模式的抽卡內容 */
const CORE_SYMBOLS = [...CONSONANTS, ...FINALS_SINGLE];

const TONES = [
  { id: 1, name: '一聲', shape: '—' },
  { id: 2, name: '二聲', shape: '／' },
  { id: 3, name: '三聲', shape: '∨' },
  { id: 4, name: '四聲', shape: '＼' },
  { id: 5, name: '輕聲', shape: '•' },
];
/* 高階模式抽聲調卡只從這裡抽：輕聲是「第二音節相對弱化」的現象，單一個字獨立念本來就不會是輕聲，
   所以拿掉輕聲，避免抽到「這個音沒有輕聲讀法」的狀況（老師實測回報過ㄑㄩ/ㄍㄨㄣ/ㄘㄢ/ㄙㄡ都沒有輕聲） */
const DRAWABLE_TONES = TONES.filter(t => t.id !== 5);
/* 少數「聲符+韻符/結合韻」組合，某幾聲調找不到常見字（太罕見或根本不存在），排除該聲調不要抽到。
   之後如果又測到類似狀況，比照這裡加一筆即可（key 是「聲符+韻符」或「聲符+結合韻」兩個符號串起來）。 */
const TONE_EXCLUDE = {
  'ㄎㄥ': [3], // ㄎㄥ 三聲（kěng）太罕見，一般人不會念
  'ㄖㄨㄛ': [2], // ㄖㄨㄛ 二聲（ruó）沒有實際存在的字
  'ㄉㄧㄡ': [2], // ㄉㄧㄡ 二聲（diú）沒有實際存在的字，常見是一聲「丟」
  'ㄉㄥ': [2], // ㄉㄥ 二聲（déng）不常見，常見是三聲「等」
  'ㄉㄢ': [2], // ㄉㄢ 二聲（dán）不常見，常見是一、三、四聲
};
function drawToneFor(comboKey) {
  const excluded = TONE_EXCLUDE[comboKey] || [];
  const pool = DRAWABLE_TONES.filter(t => !excluded.includes(t.id));
  return pick1(pool);
}

function getCategory(sym) {
  if (CONSONANTS.includes(sym)) return 'consonant';
  if (COMBINED_FINALS.includes(sym)) return 'combined';
  return 'single';
}
const CAT_ICON = { consonant: '🔴', single: '🔵', combined: '🟣' };
const CAT_LABEL = { consonant: '聲符', single: '韻符', combined: '結合韻' };

/* 聲符 <-> 韻符 雙向對照，從 COMBO_SPEECH 反推，只會抽到真的存在的組合 */
const CONSONANT_FINAL_OPTIONS = {};
const FINAL_CONSONANT_OPTIONS = {};
Object.keys(COMBO_SPEECH).forEach(key => {
  const c = key[0], f = key.slice(1);
  if (!CONSONANT_FINAL_OPTIONS[c]) CONSONANT_FINAL_OPTIONS[c] = [];
  CONSONANT_FINAL_OPTIONS[c].push(f);
  if (!FINAL_CONSONANT_OPTIONS[f]) FINAL_CONSONANT_OPTIONS[f] = [];
  FINAL_CONSONANT_OPTIONS[f].push(c);
});

/* 聲符 -> 結合韻 對照，從 COMBO3_SPEECH 反推，同樣只會抽到真的存在的字 */
const CONSONANT_COMBINED_OPTIONS = {};
Object.keys(COMBO3_SPEECH).forEach(key => {
  const c = key[0], f = key.slice(1);
  if (!CONSONANT_COMBINED_OPTIONS[c]) CONSONANT_COMBINED_OPTIONS[c] = [];
  CONSONANT_COMBINED_OPTIONS[c].push(f);
});

let zhVoice = null;
function initVoices() {
  const voices = speechSynthesis.getVoices();
  const preferOrder = [
    v => v.lang === 'zh-TW' && /Hanhan|Yating|HsiaoChen/i.test(v.name),
    v => v.lang === 'zh-TW' && /Microsoft/i.test(v.name),
    v => v.lang === 'zh-TW',
    v => v.lang === 'zh-HK',
    v => v.lang.startsWith('zh'),
  ];
  for (const matcher of preferOrder) {
    const found = voices.find(matcher);
    if (found) { zhVoice = found; break; }
  }
  if (!zhVoice && voices.length > 0) zhVoice = voices[0];
}
speechSynthesis.onvoiceschanged = initVoices;
setTimeout(initVoices, 200);
setTimeout(initVoices, 1000);

function speak(text, rate = 0.8) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-TW';
  utter.rate = rate;
  utter.pitch = 1.05;
  if (zhVoice) utter.voice = zhVoice;
  speechSynthesis.speak(utter);
}
function speakSymbol(symbol) {
  const data = PHONETIC_DATA[symbol];
  if (data) speak(data.speech);
  else speak(symbol);
}

/* ========================================
   工具
   ======================================== */
/* ㄧ 在 Windows 字型直式顯示常被畫成直線，改用「一」顯示以保持橫線形狀（只換顯示，資料仍是 ㄧ） */
function bopoDisplay(c) { return c === 'ㄧ' ? '一' : c; }
function vbopo(s) {
  if (!s) return '';
  return `<span class="vbopo">${[...s].map(c => `<span>${bopoDisplay(c)}</span>`).join('')}</span>`;
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pick1(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

/* ========================================

   4 個角落：起點／停車場／命運卡／停車場

/* steps: 走幾格（正=前進、負=後退，抽到後畫面會像擲骰子一樣一格一格走給大家看）
   scoreDelta: 加減分（立即生效，不用等動畫）
   teleportStart: 直接跳回起點（格數可能很多，不會一格格走，用瞬間移動處理） */

let BOARD = [];
function buildBoard() {
  const fillers = shuffle([
    ...CORE_SYMBOLS.map(s => ({ type: 'symbol', symbol: s, category: getCategory(s) })),
    ...Array(2).fill(null).map(() => ({ type: 'fate' })),
    ...Array(1).fill(null).map(() => ({ type: 'parking' })),
  ]);
  const board = new Array(BOARD_LEN);
  board[0] = { type: 'start' };
  board[BOARD_N - 1] = { type: 'parking' };
  board[2 * (BOARD_N - 1)] = { type: 'fate' };
  board[3 * (BOARD_N - 1)] = { type: 'parking' };
  let fi = 0;
  for (let i = 1; i < BOARD_LEN; i++) {
    if (board[i]) continue;
    board[i] = fillers[fi++];
  }
  return board;
}

function boardCellRC(i) {
  const n = BOARD_N, seg = n - 1;
  if (i < seg) return { row: n - 1, col: i };
  if (i < 2 * seg) return { row: n - 1 - (i - seg), col: n - 1 };
  if (i < 3 * seg) return { row: 0, col: n - 1 - (i - 2 * seg) };
  return { row: i - 3 * seg, col: 0 };
}

function renderPawns() {
  BOARD.forEach((_, i) => { const el = document.getElementById(`pawns-${i}`); if (el) el.innerHTML = ''; });
  teams.forEach(t => {
    const el = document.getElementById(`pawns-${t.pos}`);
    if (el) el.insertAdjacentHTML('beforeend', `<span>${t.mascot}</span>`);
  });
}

function renderScoreBar() {
  const bar = document.getElementById('score-bar');
  if (!bar) return;
  bar.innerHTML = teams.map((t, i) => `
    <div class="score-chip ${i === currentTeamIdx ? 'active' : ''}" style="border-color:${i===currentTeamIdx? t.color:'transparent'}">
      <span class="mascot">${t.mascot}</span>${t.name}：${t.score}分${t.skipNext ? ' 😌休息中' : ''}
    </div>
  `).join('');
}

function updateTurnLabel() {
  const t = teams[currentTeamIdx];
  const el = document.getElementById('turn-label');
  if (el) el.innerHTML = `輪到 <b style="color:${t.color}">${t.mascot}${t.name}</b> 擲骰子！`;
}

/* ---------- 擲骰子與移動 ---------- */
function scrollTileIntoView(idx) {
  const el = document.getElementById(`tile-${idx}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
}
function scrollCenterIntoView() {
  const el = document.querySelector('.board-center');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
}

function rollDice() {
  document.getElementById('roll-btn').disabled = true;
  scrollCenterIntoView(); // 先確保骰子在畫面上看得到，擲完才捲去跟著棋子走
  const diceBox = document.getElementById('dice-box');
  diceBox.classList.add('rolling');
  let ticks = 0;
  const spin = setInterval(() => {
    diceBox.innerHTML = diePipsHtml(Math.floor(Math.random() * 6) + 1);
    ticks++;
    if (ticks > 7) {
      clearInterval(spin);
      diceBox.classList.remove('rolling');
      const steps = Math.floor(Math.random() * 6) + 1;
      diceBox.innerHTML = diePipsHtml(steps);
      setTimeout(() => movePawn(steps), 700); // 停頓一下讓大家看清楚骰到幾點，再開始走
    }
  }, 180);
}

/* 走格動畫共用：dir 決定前進/後退，一格一格走，走到「通過起點」就直接獲勝結束遊戲（見規則變更：
   誰先回到起點誰就贏，不再是無限循環的+2分獎勵）。command 卡的移動效果也共用這個函式，讓退格/前進
   都能像擲骰子一樣看到棋子真的一步步走。 */
function animateSteps(team, delta, onDone) {
  const dir = delta > 0 ? 1 : -1;
  let remaining = Math.abs(delta);
  const stepInterval = setInterval(() => {
    if (remaining <= 0) {
      clearInterval(stepInterval);
      onDone();
      return;
    }
    const prev = team.pos;
    team.pos = (team.pos + dir + BOARD_LEN) % BOARD_LEN;
    remaining--;
    renderPawns();
    scrollTileIntoView(team.pos);
    if (dir > 0 && prev === BOARD_LEN - 1 && team.pos === 0) {
      clearInterval(stepInterval);
      winGame(team);
    }
  }, 650);
}

function movePawn(steps) {
  const team = teams[currentTeamIdx];
  animateSteps(team, steps, () => onArrive(team));
}

/* ---------- 落點處理 ---------- */

function pulseTile(idx) {
  const el = document.getElementById(`tile-${idx}`);
  if (!el) return;
  el.classList.remove('tile-landed');
  void el.offsetWidth; // 重新觸發動畫
  el.classList.add('tile-landed');
}

function onArrive(team) {
  pulseTile(team.pos);
  setTimeout(() => resolveTile(team), 500);
}

function resolveTile(team) {
  const tile = BOARD[team.pos];
  if (tile.type === 'start') { showRestModal('🚩 回到起點', '🙂'); return; }
  if (tile.type === 'parking') {
    team.skipNext = true;
    showRestModal('🅿️ 停車場', '😌', '要休息一輪，下一次輪到時要跳過，再等一輪才能擲骰子！');
    return;
  }
  if (tile.type === 'fate') { showFateModal(); return; }

  const sym = tile.symbol, cat = tile.category;
  if (tier === 'basic') { showSoloModal(sym); return; }

  if (cat === 'consonant') {
    const options = [...(CONSONANT_FINAL_OPTIONS[sym] || []), ...(CONSONANT_COMBINED_OPTIONS[sym] || [])];
    if (options.length) { showPairModal(sym, pick1(options)); return; }
    showSoloModal(sym); // 理論上不會發生：21個聲符在 COMBO_SPEECH/COMBO3_SPEECH 裡都至少有一種合法組合
    return;
  }
  // cat === 'single'
  const consonants = FINAL_CONSONANT_OPTIONS[sym];
  if (consonants && consonants.length) { showPairModal(pick1(consonants), sym); return; }
  showSoloModal(sym); // ㄝ/ㄦ/ㄧ 這幾個在資料庫裡找不到合法配對聲符，退回單獨念讀
}

function closeModal() {
  const m = document.querySelector('.modal-bg');
  if (m) m.remove();
}

function openModal(html) {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal-box">${html}</div>`;
  document.body.appendChild(bg);
}

/* 一聲在注音/拼音標準寫法裡本來就不標調號，所以抽到一聲時畫面刻意不秀聲調卡、也不特別提示——
   看不到聲調卡就代表念一聲，跟真實注音的慣例一致。但計分仍當作有抽到聲調（+3分），因為念對聲調本身還是比較難。 */
function toneDisplay(tone) {
  if (!tone || tone.id === 1) return { html: '', suffix: '' };
  return {
    html: `<div class="draw-card tone-card">${tone.shape}<div class="card-label">${tone.name}</div></div>`,
    suffix: `，然後用「${tone.name}」念一次`,
  };
}

function showSoloModal(symbol) {
  awaitingJudge = true;
  const tone = tier === 'high' ? drawToneFor(symbol) : null;
  const points = tier === 'basic' ? 1 : (tone ? 3 : 2);
  const { html: toneHtml, suffix } = toneDisplay(tone);
  const prompt = '請念出這個注音' + suffix;
  openModal(`
    <h2>${CAT_ICON[getCategory(symbol)]} 認讀</h2>
    <div class="card-row"><div class="draw-card">${vbopo(symbol)}<div class="card-label">${CAT_LABEL[getCategory(symbol)]}卡</div></div>${toneHtml}</div>
    <div class="modal-note">${prompt}</div>
    <div class="judge-row">
      <button class="btn btn-green" onclick="judgeTile(true, ${points})">✅ 念對了（+${points}分）</button>
      <button class="btn btn-gray" onclick="judgeTile(false, 0)">🔁 再練習一次</button>
    </div>
  `);
}

function showPairModal(consonant, final) {
  awaitingJudge = true;
  const tone = tier === 'high' ? drawToneFor(consonant + final) : null;
  const points = tone ? 3 : 2;
  const { html: toneHtml, suffix } = toneDisplay(tone);
  const prompt = '請把兩張卡拼起來念出來' + suffix;
  const finalLabel = getCategory(final) === 'combined' ? '結合韻卡' : '韻符卡';
  openModal(`
    <h2>🎯 拼音配對</h2>
    <div class="card-row">
      <div class="draw-card">${vbopo(consonant)}<div class="card-label">聲符卡</div></div>
      <div class="draw-card">${vbopo(final)}<div class="card-label">${finalLabel}</div></div>
      ${toneHtml}
    </div>
    <div class="modal-note">${prompt}</div>
    <div class="judge-row">
      <button class="btn btn-green" onclick="judgeTile(true, ${points})">✅ 都對了（+${points}分）</button>
      <button class="btn btn-gray" onclick="judgeTile(false, 0)">🔁 再練習一次</button>
    </div>
  `);
}

let pendingFateCard = null;
function showFateModal() {
  const card = pick1(FATE_CARDS);
  const team = teams[currentTeamIdx];
  if (card.scoreDelta) {
    team.score = Math.max(team.score + card.scoreDelta, 0);
    renderScoreBar();
  }
  pendingFateCard = card;
  openModal(`
    <h2>🔮 命運卡</h2>
    <div class="big-symbol">🎴</div>
    <div class="modal-note">${card.text}</div>
    <div class="judge-row"><button class="btn btn-pink" onclick="continueFate()">繼續</button></div>
  `);
}

/* 命運卡的走格效果（前進/後退）點「繼續」才開始走，讓大家先看清楚抽到的效果文字，
   再看棋子真的一步步走過去，不要一瞬間就跳到新位置。 */
function continueFate() {
  closeModal();
  const card = pendingFateCard;
  pendingFateCard = null;
  const team = teams[currentTeamIdx];
  if (card && card.steps) {
    animateSteps(team, card.steps, () => onArrive(team));
  } else if (card && card.teleportStart) {
    team.pos = 0;
    renderPawns();
    scrollTileIntoView(0);
    setTimeout(nextTurn, 700);
  } else {
    nextTurn();
  }
}

function showRestModal(title, icon, note) {
  openModal(`
    <h2>${title}</h2>
    <div class="big-symbol">${icon}</div>
    <div class="modal-note">${note || '先休息一下，換下一隊！'}</div>
    <div class="judge-row"><button class="btn btn-pink" onclick="closeModalAndContinue()">繼續</button></div>
  `);
}

function closeModalAndContinue() {
  closeModal();
  nextTurn();
}

function judgeTile(correct, points) {
  if (!awaitingJudge) return;
  awaitingJudge = false;
  if (correct) teams[currentTeamIdx].score += points;
  renderScoreBar();
  closeModal();
  nextTurn();
}

function nextTurn() {
  currentTeamIdx = (currentTeamIdx + 1) % teams.length;
  while (teams[currentTeamIdx].skipNext) {
    teams[currentTeamIdx].skipNext = false;
    renderScoreBar();
    currentTeamIdx = (currentTeamIdx + 1) % teams.length;
  }
  updateTurnLabel();
  renderScoreBar();
  const rollBtn = document.getElementById('roll-btn');
  if (rollBtn) rollBtn.disabled = false;
  scrollCenterIntoView();
}

/* ---------- 結算 ---------- */
function endGame(headline) {
  const ranked = [...teams].sort((a, b) => b.score - a.score);
  const summary = ranked.map(t => `${t.mascot}${t.name} ${t.score}分`).join('、');
  try {
    localStorage.setItem('zhuyin_monopoly_last_result', JSON.stringify({ summary, time: Date.now() }));
  } catch (e) {}

  openModal(`
    <h2>🏆 遊戲結束！</h2>
    <div class="modal-note" style="font-size:20px;color:#ff6b9d;font-weight:bold;">${headline}</div>
    <ul class="rank-list">
      ${ranked.map((t, i) => `<li><span class="mascot">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'🎖️'}</span><span class="mascot">${t.mascot}</span>${t.name}<span class="score">${t.score} 分</span></li>`).join('')}
    </ul>
    <div class="judge-row">
      <button class="btn btn-pink" onclick="restartGame()">🔄 再玩一次</button>
    </div>
  `);
}

/* 誰先繞一圈回到起點就贏，遊戲立刻結束（不再是無限循環由老師手動結束） */
function winGame(team) {
  endGame(`${team.mascot} ${team.name} 第一個回到起點，獲勝！🎉`);
}

/* 老師隨時可以按「結束遊戲」提早收尾（例如下課時間到了但還沒有人回到起點），改用分數排名 */
function finishGame() {
  endGame('老師提早結束遊戲，依目前分數排名：');
}

function restartGame() {
  closeModal();
  renderStart();
}

renderStart();
</script>
